{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bookorbit.fullname" . }}-postgres
  labels:
    {{- include "bookorbit.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "bookorbit.postgresSelectorLabels" . | nindent 4 }}
{{- end }}
