{{- if .Values.cloudflare.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bookorbit.fullname" . }}-cloudflared
  labels:
    {{- include "bookorbit.labels" . | nindent 4 }}
data:
  config.yaml: |
    tunnel: {{ required "cloudflare.tunnelId is required when cloudflare.enabled=true" .Values.cloudflare.tunnelId }}
    credentials-file: /etc/cloudflared/credentials.json
    ingress:
      - hostname: {{ required "cloudflare.hostname is required when cloudflare.enabled=true" .Values.cloudflare.hostname }}
        service: http://{{ include "bookorbit.fullname" . }}:{{ .Values.service.port }}
      - service: http_status:404
{{- end }}
