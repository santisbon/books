{{- if not .Values.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bookorbit.fullname" . }}
  labels:
    {{- include "bookorbit.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ required "credentials.postgresPassword is required" .Values.credentials.postgresPassword | quote }}
  jwt-secret: {{ required "credentials.jwtSecret is required" .Values.credentials.jwtSecret | quote }}
  setup-bootstrap-token: {{ required "credentials.setupBootstrapToken is required" .Values.credentials.setupBootstrapToken | quote }}
{{- end }}
