# Only 0 or 1 are meaningful. The books and data PVCs are ReadWriteOnce, which
# binds each volume to one node, so a second replica landing on another node
# stays Pending on FailedAttachVolume. See the HPA section of the README.
# Set to 0 to hold the app down across a helm upgrade, e.g. for a consistent
# backup or while restoring the database; a plain `kubectl scale` is undone by
# the next upgrade.
replicaCount: 1

image:
  repository: ghcr.io/bookorbit/bookorbit
  pullPolicy: IfNotPresent
  tag: "2.3.0"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

# User and group the BookOrbit process runs as inside the container.
# Change these if your media files are owned by a different uid/gid.
# fsGroup is set to pgid automatically so Kubernetes chowns mounted
# volumes to the right group before the container starts.
process:
  puid: 1000
  pgid: 1000

service:
  type: ClusterIP
  port: 3000

# Gateway API HTTPRoute. MicroK8s ingress addon provisions a Traefik-based
# Gateway named "traefik-gateway" in the "ingress" namespace.
httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: traefik-gateway
      namespace: ingress
  hostnames: []
  # - books.node-01.local

# Application config
config:
  # Required: full URL where BookOrbit will be accessed (e.g. http://books.node-01.local)
  appUrl: ""
  logLevel: info
  # Node.js heap limit in MB. On 4 GiB Raspberry Pis the default of 2048 allows
  # Node.js to consume enough memory during large PDF/metadata processing to
  # trigger the kernel OOM killer, which starves the Ceph OSD of memory and
  # causes it to lose its monitor heartbeat and go down. 512 keeps the heap
  # well under the container memory limit below, leaving room for the
  # ffmpeg/ffprobe child processes metadata embedding spawns in the same
  # cgroup. (Previously 1024/1536Mi: that pairing let the process reach only
  # ~622MB RSS before a global, node-wide OOM hit first — node-02's Ceph
  # daemons run outside Kubernetes and aren't reserved for in kubelet's
  # accounting, so real headroom is much less than the limit implied.)
  nodeMaxOldSpaceSize: 512

# Credentials. Set at install time with --set or -f my-values.yaml.
# Do not commit values containing these to source control.
credentials:
  postgresPassword: ""
  jwtSecret: ""
  setupBootstrapToken: ""
  # Name of a pre-existing Secret to use instead of creating one.
  # Must contain keys: postgres-password, jwt-secret, setup-bootstrap-token
  existingSecret: ""

# Bundled PostgreSQL. Uses pgvector/pgvector to satisfy the vector extension
# requirement, tracking the major version upstream BookOrbit ships in its
# docker-compose.yml. Set enabled=false to use an external database.
# Changing the major version is not a drop-in edit: PostgreSQL cannot read a
# data directory written by a different major version, so the pod will refuse
# to start until the volume is dumped and restored. See the README.
postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg18
    pullPolicy: IfNotPresent
  user: bookorbit
  database: bookorbit
  port: 5432
  # host is only used when postgres.enabled=false
  host: ""
  persistence:
    storageClass: "ceph-rbd"
    size: 5Gi
    existingClaim: ""

persistence:
  books:
    storageClass: "ceph-rbd"
    size: 10Gi
    existingClaim: ""
  data:
    storageClass: "ceph-rbd"
    size: 1Gi
    existingClaim: ""

cloudflare:
  enabled: false
  # ID of the tunnel created with: cloudflared tunnel create bookorbit
  tunnelId: ""
  # Public hostname to expose, e.g. books.yourdomain.com
  hostname: ""
  # Name of a pre-existing Secret containing credentials.json from:
  #   kubectl create secret generic <name> \
  #     --from-file=credentials.json=~/.cloudflared/<tunnel-id>.json
  credentialsSecret: "cloudflared-credentials"
  image:
    # Pin to a specific release; check https://github.com/cloudflare/cloudflared/releases
    tag: "2026.6.1"
    pullPolicy: IfNotPresent

# Without limits this pod runs as BestEffort (oom_score_adj=1000), making it
# the first thing the kernel kills under memory pressure. On 4 GiB Pis, large
# PDF/metadata saves push Node.js's RSS up, and node-02's Ceph mon/mgr/osd
# daemons run outside Kubernetes (not reserved for in kubelet's allocatable
# accounting), so real free memory is well below what the node reports as
# available. 768Mi keeps this container's own cgroup limit as the thing that
# trips a memory spike (clean OOMKilled + pod restart) instead of a node-wide
# OOM that can take out the Ceph OSD sharing the box.
resources:
  limits:
    memory: 768Mi  # headroom above nodeMaxOldSpaceSize (512Mi heap + overhead)
  requests:
    cpu: 250m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}
